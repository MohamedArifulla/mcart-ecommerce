name: MCart CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to EC2 with GUID
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            BUILD_ID=$(cat /proc/sys/kernel/random/uuid | cut -c1-8)
            echo "Build ID: $BUILD_ID"
            cd ~/mcart
            git pull origin main
            sed -i "s/REPLACED_BY_CI/$BUILD_ID/g" frontend/src/environments/environment.ts
            sudo docker compose down
            sudo docker compose up -d --build
            sed -i "s/$BUILD_ID/REPLACED_BY_CI/g" frontend/src/environments/environment.ts
            echo "✅ MCart deployed! Build: $BUILD_ID"
